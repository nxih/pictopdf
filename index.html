<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PicToPDF Ultra</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PicToPDF">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBpY1RvUERGIFVsdHJhIiwKICAic2hvcnRfbmFtZSI6ICJQaWNUb1BERiIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjFmNWY5IiwKICAidGhlbWVfY29sb3IiOiAiIzQzMzhjYSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8zMzcvMzM3OTQ2LnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen">

    <header class="glass sticky top-0 z-50 border-b px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tight text-indigo-600">PicToPDF</h1>
        <div class="flex gap-4">
            <button onclick="togglePreview()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Preview</button>
        </div>
    </header>

    <main class="p-5 max-w-2xl mx-auto space-y-6 pb-40">
        <div class="relative group">
            <input type="file" id="image-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer">
            <div class="bg-white border-2 border-dashed border-slate-300 rounded-3xl p-8 text-center active:scale-95 transition-transform shadow-sm">
                <div class="text-4xl mb-2">🖼️</div>
                <span class="text-slate-700 font-bold">Select from Photos</span>
            </div>
        </div>

        <section id="settings-area" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Image Scaling</label>
                    <select id="setting-fit" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold" onchange="updateLivePreview()">
                        <option value="contain">Original (No Warp)</option>
                        <option value="stretch">Stretch to Fit</option>
                        <option value="cover">Fill Page (Crop)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Margins</label>
                    <input type="range" id="setting-margin" min="0" max="30" value="10" class="w-full mt-4 accent-indigo-600" oninput="updateLivePreview()">
                </div>
            </div>
        </section>

        <div id="preview-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <div id="preview-modal" class="fixed inset-0 z-[60] bg-black/95 hidden flex flex-col translate-y-full transition-transform duration-300">
        <div class="p-6 flex justify-between items-center text-white border-b border-white/10">
            <h2 class="font-bold">PDF Mockup</h2>
            <button onclick="togglePreview()" class="bg-white/10 px-5 py-2 rounded-full text-sm font-bold">Done</button>
        </div>
        <div id="preview-scroll" class="flex-grow overflow-y-auto p-10 space-y-10 flex flex-col items-center no-scrollbar"></div>
    </div>

    <footer id="action-bar" class="hidden fixed bottom-0 left-0 right-0 glass border-t p-6 pb-10 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div>
                <p id="stats" class="text-xs font-black text-slate-400 uppercase tracking-tighter">0 Images</p>
                <p class="text-[10px] text-green-500 font-bold">OFFLINE READY</p>
            </div>
            <button id="convert-btn" onclick="generatePDF()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center gap-3">
                <span>EXPORT</span>
                <div id="loader" class="hidden border-2 border-white/30 border-t-white h-4 w-4 rounded-full animate-spin"></div>
            </button>
        </div>
    </footer>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const { jsPDF } = window.jspdf;
        let images = [];

        const input = document.getElementById('image-input');
        const grid = document.getElementById('preview-grid');
        const modal = document.getElementById('preview-modal');
        const scrollContainer = document.getElementById('preview-scroll');

        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const dataUrl = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = (ev) => r(ev.target.result);
                    reader.readAsDataURL(file);
                });
                const img = new Image();
                await new Promise(r => { img.onload = r; img.src = dataUrl; });
                images.push({ dataUrl, w: img.width, h: img.height });
            }
            updateUI();
        };

        function updateUI() {
            grid.innerHTML = '';
            images.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = "relative aspect-square bg-white rounded-xl overflow-hidden shadow-sm";
                div.innerHTML = `<img src="${img.dataUrl}" class="w-full h-full object-cover">
                                 <button onclick="removeImg(${i})" class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1">✕</button>`;
                grid.appendChild(div);
            });
            document.getElementById('settings-area').classList.toggle('hidden', images.length === 0);
            document.getElementById('action-bar').classList.toggle('hidden', images.length === 0);
            document.getElementById('stats').innerText = `${images.length} PHOTOS`;
        }

        function removeImg(i) { images.splice(i, 1); updateUI(); }

        function togglePreview() {
            modal.classList.toggle('hidden');
            setTimeout(() => modal.classList.toggle('translate-y-full'), 10);
            if (!modal.classList.contains('hidden')) renderLivePreview();
        }

        function renderLivePreview() {
            scrollContainer.innerHTML = '';
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);
            
            images.forEach((img) => {
                const page = document.createElement('div');
                page.className = "bg-white shadow-2xl relative shrink-0";
                page.style.width = "260px"; page.style.height = "367px"; // A4 Ratio
                
                const inner = document.createElement('img');
                inner.src = img.dataUrl;
                inner.style.position = "absolute";
                inner.style.top = inner.style.left = inner.style.right = inner.style.bottom = margin + "px";
                inner.style.width = `calc(100% - ${margin*2}px)`;
                inner.style.height = `calc(100% - ${margin*2}px)`;
                
                if (fit === 'contain') inner.style.objectFit = "contain";
                else if (fit === 'stretch') inner.style.objectFit = "fill";
                else inner.style.objectFit = "cover";

                page.appendChild(inner);
                scrollContainer.appendChild(page);
            });
        }

        async function generatePDF() {
            const btn = document.getElementById('convert-btn');
            const loader = document.getElementById('loader');
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);

            btn.disabled = true; loader.classList.remove('hidden');

            const doc = new jsPDF();
            for (let i = 0; i < images.length; i++) {
                if (i > 0) doc.addPage();
                const img = images[i];
                const pW = doc.internal.pageSize.getWidth();
                const pH = doc.internal.pageSize.getHeight();
                const aW = pW - (margin * 2);
                const aH = pH - (margin * 2);

                let dW = aW, dH = (img.h * aW) / img.w;
                if (fit === 'contain' && dH > aH) { dH = aH; dW = (img.w * aH) / img.h; }
                if (fit === 'stretch') { dW = aW; dH = aH; }
                if (fit === 'cover' && dH < aH) { dH = aH; dW = (img.w * aH) / img.h; }

                doc.addImage(img.dataUrl, 'JPEG', (pW-dW)/2, (pH-dH)/2, dW, dH);
            }
            doc.save(`PDF_${Date.now()}.pdf`);
            btn.disabled = false; loader.classList.add('hidden');
        }
    </script>
</body>
</html>
