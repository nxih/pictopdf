<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PicToPDF Ultra</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* iOS-like button feel */
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body class="bg-[#F2F2F7] font-sans text-slate-900 min-h-screen">

    <header class="glass sticky top-0 z-50 border-b px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-extrabold tracking-tight text-indigo-600">PicToPDF</h1>
        <button onclick="togglePreview()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full btn-active">Live Preview</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto space-y-6 pb-44">
        <div class="relative group">
            <input type="file" id="image-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer">
            <div class="bg-white border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center transition-all shadow-sm">
                <div class="text-5xl mb-3">📸</div>
                <span class="text-slate-700 font-bold text-lg">Add Photos</span>
                <p class="text-slate-400 text-xs mt-1">Select from your Apple Gallery</p>
            </div>
        </div>

        <section id="settings-area" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Scale Mode</label>
                    <select id="setting-fit" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold outline-none border-none" onchange="renderLivePreview()">
                        <option value="contain">Original Aspect</option>
                        <option value="stretch">Stretch to Fit</option>
                        <option value="cover">Fill Page (Crop)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Margin</label>
                    <input type="range" id="setting-margin" min="0" max="30" value="10" class="w-full mt-4 accent-indigo-600" oninput="renderLivePreview()">
                </div>
            </div>
        </section>

        <div id="preview-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <div id="preview-modal" class="fixed inset-0 z-[60] bg-slate-900/95 hidden flex flex-col translate-y-full transition-transform duration-300 ease-in-out">
        <div class="p-6 flex justify-between items-center text-white border-b border-white/10 glass">
            <h2 class="font-bold">PDF Layout</h2>
            <button onclick="togglePreview()" class="bg-white/10 px-6 py-2 rounded-full text-sm font-bold btn-active">Close</button>
        </div>
        <div id="preview-scroll" class="flex-grow overflow-y-auto p-8 space-y-10 flex flex-col items-center no-scrollbar"></div>
    </div>

    <footer id="action-bar" class="hidden fixed bottom-0 left-0 right-0 glass border-t p-6 pb-10 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex flex-col">
                <p id="stats" class="text-sm font-black text-slate-800 tracking-tighter">0 PHOTOS</p>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Offline Mode</span>
                </div>
            </div>
            <button id="convert-btn" onclick="generatePDF()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl btn-active flex items-center gap-3">
                <span>EXPORT PDF</span>
                <div id="loader" class="hidden border-2 border-white/30 border-t-white h-4 w-4 rounded-full animate-spin"></div>
            </button>
        </div>
    </footer>

    <script>
        const { jsPDF } = window.jspdf;
        let images = [];

        const input = document.getElementById('image-input');
        const grid = document.getElementById('preview-grid');
        const modal = document.getElementById('preview-modal');
        const scrollContainer = document.getElementById('preview-scroll');

        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const processedImg = await processImage(file);
                images.push(processedImg);
            }
            updateUI();
        };

        // This fixes the orientation by drawing it to a canvas first
        async function processImage(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        // Convert to high-quality JPEG
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                        resolve({ dataUrl, w: img.width, h: img.height });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updateUI() {
            grid.innerHTML = '';
            images.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = "relative aspect-square bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 animate-in fade-in zoom-in duration-300";
                div.innerHTML = `<img src="${img.dataUrl}" class="w-full h-full object-cover">
                                 <button onclick="removeImg(${i})" class="absolute top-2 right-2 bg-black/60 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs backdrop-blur-md">✕</button>`;
                grid.appendChild(div);
            });
            const hasData = images.length > 0;
            document.getElementById('settings-area').classList.toggle('hidden', !hasData);
            document.getElementById('action-bar').classList.toggle('hidden', !hasData);
            document.getElementById('stats').innerText = `${images.length} PHOTOS`;
            if (!modal.classList.contains('hidden')) renderLivePreview();
        }

        function removeImg(i) { images.splice(i, 1); updateUI(); }

        function togglePreview() {
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('translate-y-full'), 10);
                renderLivePreview();
            } else {
                modal.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function renderLivePreview() {
            scrollContainer.innerHTML = '';
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);
            
            images.forEach((img) => {
                const page = document.createElement('div');
                page.className = "bg-white shadow-2xl relative shrink-0 rounded-sm";
                // Visual A4 Scale for Mobile (210mm x 297mm)
                page.style.width = "280px"; 
                page.style.height = "396px"; 
                
                const inner = document.createElement('img');
                inner.src = img.dataUrl;
                inner.style.position = "absolute";
                inner.style.top = inner.style.left = inner.style.right = inner.style.bottom = (margin * 1.3) + "px"; // Visual scaling for mm to px
                inner.style.width = `calc(100% - ${(margin*2)*1.3}px)`;
                inner.style.height = `calc(100% - ${(margin*2)*1.3}px)`;
                
                if (fit === 'contain') inner.style.objectFit = "contain";
                else if (fit === 'stretch') inner.style.objectFit = "fill";
                else inner.style.objectFit = "cover";

                page.appendChild(inner);
                scrollContainer.appendChild(page);
            });
        }

        async function generatePDF() {
            const btn = document.getElementById('convert-btn');
            const loader = document.getElementById('loader');
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);

            btn.disabled = true; 
            loader.classList.remove('hidden');
            btn.querySelector('span').innerText = "GENERATING...";

            const doc = new jsPDF({ compress: true });
            
            for (let i = 0; i < images.length; i++) {
                if (i > 0) doc.addPage();
                const img = images[i];
                const pW = doc.internal.pageSize.getWidth();
                const pH = doc.internal.pageSize.getHeight();
                const aW = pW - (margin * 2);
                const aH = pH - (margin * 2);

                let dW = aW, dH = (img.h * aW) / img.w;

                if (fit === 'contain') {
                    if (dH > aH) { dH = aH; dW = (img.w * aH) / img.h; }
                } else if (fit === 'stretch') {
                    dW = aW; dH = aH;
                } else if (fit === 'cover') {
                    if (dH < aH) { dH = aH; dW = (img.w * aH) / img.h; }
                }

                // Adding the image (Canvas-processed JPEG)
                doc.addImage(img.dataUrl, 'JPEG', (pW-dW)/2, (pH-dH)/2, dW, dH, undefined, 'FAST');
            }

            // iOS FIX: Instead of save(), we create a Data URI.
            // This allows iOS to name the file correctly in the share sheet.
            const pdfData = doc.output('datauristring', { filename: `Photos_${Date.now()}.pdf` });
            
            // Create a temporary link and trigger it
            const link = document.createElement('a');
            link.href = pdfData;
            link.download = `Photos_${Date.now()}.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            btn.disabled = false; 
            loader.classList.add('hidden');
            btn.querySelector('span').innerText = "EXPORT PDF";
        }
    </script>
</body>
</html>
