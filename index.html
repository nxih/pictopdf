<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F2F2F7">
    <title>PicToPDF Ultra</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom); 
            overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile PWA */
        }
        .glass { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Cropper Custom Theme */
        .cropper-view-box, .cropper-face { border-radius: 4px; }
        .cropper-line, .cropper-point { background-color: #4f46e5; }

        /* Premium Drag & Drop Reordering Styles */
        .grid-item-card {
            touch-action: pan-y; /* Allow vertical scroll, but capture press-and-hold */
            -webkit-touch-callout: none; /* Prevent iOS native image menu */
            user-select: none;
            -webkit-user-select: none;
        }
        .sortable-chosen {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            z-index: 50;
            border-color: #4f46e5;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease;
        }
        .sortable-ghost {
            opacity: 0.5;
            background-color: #e0e7ff !important; /* indigo-100 */
            border: 2px dashed #4f46e5 !important; /* indigo-600 */
            transform: scale(0.95);
            border-radius: 1rem;
        }
        .sortable-ghost img, .sortable-ghost div, .sortable-ghost button {
            opacity: 0 !important; /* Hide content in the placeholder drop zone */
        }
        .sortable-fallback {
            opacity: 0.95 !important;
            cursor: grabbing !important;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }
    </style>
</head>
<body class="bg-[#F2F2F7] font-sans text-slate-900 min-h-screen selection:bg-indigo-100">

    <!-- Header -->
    <header class="glass sticky top-0 z-40 border-b border-slate-200/50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex flex-col">
            <h1 class="text-xl font-extrabold tracking-tight text-indigo-600 flex items-center gap-1">
                PicToPDF <span class="text-indigo-400">Ultra</span>
            </h1>
            <p class="text-[9px] text-slate-400 font-mono leading-none font-bold tracking-wider mt-0.5">
                BUILD: <span id="build-hash" class="text-slate-500">LOADING...</span>
            </p>
        </div>
        <div id="offline-indicator" class="hidden flex items-center gap-1.5 bg-green-50 px-3 py-1.5 rounded-full">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
            <span class="text-[9px] text-green-700 font-bold uppercase tracking-widest">Ready</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-5 max-w-2xl mx-auto space-y-6 pb-48">
        
        <!-- Upload Area -->
        <div class="relative group active:scale-[0.98] transition-transform duration-200">
            <input type="file" id="image-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer">
            <div class="bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-3xl p-8 text-center shadow-sm flex flex-col items-center justify-center gap-2 transition-colors group-hover:bg-indigo-100">
                <div class="bg-white p-4 rounded-full shadow-sm text-indigo-600 mb-1">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-indigo-900 font-extrabold text-lg">Add Photos</span>
                <p class="text-indigo-400 text-xs font-semibold">Tap to select & crop from Gallery</p>
            </div>
        </div>

        <!-- Settings Panel -->
        <section id="settings-area" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="grid grid-cols-2 gap-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Scale Mode</label>
                    <div class="relative">
                        <select id="setting-fit" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold outline-none appearance-none focus:ring-2 ring-indigo-500 transition-shadow">
                            <option value="contain">Original Aspect</option>
                            <option value="stretch">Stretch to Fit</option>
                            <option value="cover">Fill Page (Crop)</option>
                        </select>
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider flex justify-between">
                        <span>Margin</span>
                        <span id="margin-val" class="text-indigo-600">10mm</span>
                    </label>
                    <input type="range" id="setting-margin" min="0" max="30" value="10" class="w-full mt-2 accent-indigo-600" oninput="document.getElementById('margin-val').innerText = this.value + 'mm';">
                </div>
            </div>
        </section>

        <!-- Image Grid (Sortable) -->
        <div id="preview-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <!-- Crop Modal -->
    <div id="crop-modal" class="fixed inset-0 z-[70] bg-black hidden flex-col transition-opacity duration-300">
        <div class="pt-[max(env(safe-area-inset-top),1rem)] pb-4 px-6 flex justify-between items-center text-white border-b border-white/10 glass-dark">
            <button onclick="cancelCropQueue()" class="text-sm font-bold text-red-400 active:opacity-70 transition-opacity p-2 -ml-2">Cancel</button>
            <h2 id="crop-title" class="font-bold text-lg tracking-tight">Crop Photo</h2>
            <button onclick="skipCrop()" class="text-sm font-bold text-slate-300 active:opacity-70 transition-opacity p-2 -mr-2">Skip</button>
        </div>
        
        <div class="flex-grow relative bg-black overflow-hidden w-full h-full flex items-center justify-center">
            <img id="crop-image" class="block max-w-full" src="">
        </div>

        <div class="pb-[max(env(safe-area-inset-bottom),2rem)] pt-6 px-6 border-t border-white/10 flex justify-center glass-dark">
            <button id="crop-btn" onclick="confirmCrop()" class="bg-indigo-600 hover:bg-indigo-500 text-white w-full py-4 rounded-2xl font-black shadow-xl btn-active flex justify-center items-center gap-2 text-lg transition-colors">
                <span id="crop-btn-text">Crop & Next</span>
                <div id="crop-loader" class="hidden border-2 border-white/30 border-t-white h-5 w-5 rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- Live Preview & Export Modal -->
    <div id="preview-modal" class="fixed inset-0 z-[60] bg-slate-900 hidden flex-col translate-y-full transition-transform duration-300 ease-in-out">
        <div class="shrink-0 pt-[max(env(safe-area-inset-top),1rem)] pb-4 px-6 flex justify-between items-center text-white border-b border-white/10 glass-dark">
            <button onclick="closePreview()" class="text-sm font-bold text-slate-300 active:opacity-70 p-2 -ml-2 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back
            </button>
            <div class="flex flex-col items-center">
                <h2 class="font-bold text-lg tracking-tight">PDF Preview</h2>
                <span class="text-[9px] text-indigo-300 font-bold uppercase tracking-widest bg-indigo-900/50 px-2 py-0.5 rounded mt-0.5">Draft Layout</span>
            </div>
            <div class="w-12"></div>
        </div>
        
        <div id="preview-scroll" class="flex-1 overflow-y-auto p-8 space-y-10 flex flex-col items-center no-scrollbar relative"></div>

        <div class="shrink-0 pb-[max(env(safe-area-inset-bottom),1.5rem)] pt-4 px-6 border-t border-white/10 glass-dark">
            <button id="modal-export-btn" onclick="generateAndSharePDF()" class="bg-indigo-600 hover:bg-indigo-500 text-white w-full py-4 rounded-2xl font-black shadow-xl shadow-indigo-600/20 active:scale-[0.98] transition-all flex justify-center items-center gap-3 text-lg">
                <span id="export-btn-text">SAVE PDF</span>
                <div id="modal-loader" class="hidden border-2 border-white/30 border-t-white h-5 w-5 rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- Main Screen Action Bar -->
    <footer id="action-bar" class="hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-200/50 p-6 pb-[max(env(safe-area-inset-bottom),1.5rem)] z-40">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex flex-col">
                <p id="stats" class="text-base font-black text-slate-800 tracking-tighter">0 PHOTOS</p>
                <p id="stats-subtext" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5 transition-colors">Ready for review</p>
            </div>
            
            <button id="preview-flow-btn" onclick="openPreview()" class="bg-indigo-600 text-white px-7 py-4 rounded-2xl font-black shadow-xl shadow-indigo-600/20 btn-active flex items-center gap-2 transition-colors hover:bg-indigo-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                <span>PREVIEW & EXPORT</span>
            </button>
        </div>
    </footer>

    <script>
        // --- Fetch Latest Commit Hash ---
        document.addEventListener("DOMContentLoaded", () => {
            fetch('https://api.github.com/repos/nxih/pictopdf/commits/main')
                .then(response => response.json())
                .then(data => {
                    const hashEl = document.getElementById('build-hash');
                    if (data && data.sha) hashEl.innerText = data.sha.substring(0, 7);
                    else hashEl.innerText = 'UNKNOWN';
                })
                .catch(() => document.getElementById('build-hash').innerText = 'LOCAL');
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(reg => {
                if(reg) document.getElementById('offline-indicator').classList.remove('hidden');
            });
        }

        const { jsPDF } = window.jspdf;
        
        let images = [];
        let cropQueue =[];
        let totalCropItems = 0;
        let currentCropIndex = 0;
        let currentOriginalFile = null;
        let cropperInstance = null;
        let sortableInstance = null;

        const isDesktop = window.matchMedia("(min-width: 1024px) or ((hover: hover) and (pointer: fine))").matches;

        document.addEventListener("DOMContentLoaded", () => {
            if (isDesktop) document.getElementById('export-btn-text').innerText = "DOWNLOAD PDF";
        });

        const input = document.getElementById('image-input');
        const grid = document.getElementById('preview-grid');
        const modalPreview = document.getElementById('preview-modal');
        const scrollContainer = document.getElementById('preview-scroll');
        const modalCrop = document.getElementById('crop-modal');

        // --- Init Premium Mobile Drag & Drop ---
        document.addEventListener("DOMContentLoaded", () => {
            sortableInstance = new Sortable(grid, {
                animation: 250,
                easing: "cubic-bezier(0.2, 0, 0, 1)",
                delay: 200, // Important: 200ms delay requires intent, allowing normal page scroll on mobile
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                forceFallback: true, // Overrides the native OS drag image for complete styling control
                fallbackClass: 'sortable-fallback',
                fallbackOnBody: true,
                filter: '.no-drag', // Do not pick up the item if they click the remove button
                preventOnFilter: false,
                onEnd: function (evt) {
                    if (evt.oldIndex === evt.newIndex) return;
                    const item = images.splice(evt.oldIndex, 1)[0];
                    images.splice(evt.newIndex, 0, item);
                    setTimeout(updateUI, 0); 
                }
            });
        });

        input.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            
            cropQueue = files;
            totalCropItems = files.length;
            currentCropIndex = 1;
            e.target.value = ''; 
            processNextCrop();
        };

        function processNextCrop() {
            if (cropQueue.length === 0) {
                closeCropModal();
                updateUI();
                return;
            }
            currentOriginalFile = cropQueue.shift();
            document.getElementById('crop-title').innerText = `Crop (${currentCropIndex}/${totalCropItems})`;
            document.getElementById('crop-btn-text').innerText = cropQueue.length > 0 ? 'Crop & Next' : 'Crop & Done';

            const reader = new FileReader();
            reader.onload = (e) => {
                openCropModal();
                const imageEl = document.getElementById('crop-image');
                imageEl.src = e.target.result;
                if (cropperInstance) cropperInstance.destroy();
                
                setTimeout(() => {
                    cropperInstance = new Cropper(imageEl, {
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 0.9,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: false,
                    });
                }, 100);
            };
            reader.readAsDataURL(currentOriginalFile);
        }

        function openCropModal() {
            modalCrop.classList.remove('hidden');
            modalCrop.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeCropModal() {
            modalCrop.classList.add('hidden');
            modalCrop.classList.remove('flex');
            document.body.style.overflow = '';
            if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
        }

        function cancelCropQueue() {
            cropQueue =[];
            closeCropModal();
            updateUI(); 
        }

        async function skipCrop() {
            showCropLoading(true);
            const imgData = await processImage(currentOriginalFile);
            images.push(imgData);
            currentCropIndex++;
            showCropLoading(false);
            processNextCrop();
        }

        async function confirmCrop() {
            if (!cropperInstance) return;
            showCropLoading(true);
            await new Promise(r => setTimeout(r, 50));
            const canvas = cropperInstance.getCroppedCanvas({ maxWidth: 2048, maxHeight: 2048, fillColor: '#fff' });
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            images.push({ dataUrl, w: canvas.width, h: canvas.height });
            currentCropIndex++;
            showCropLoading(false);
            processNextCrop();
        }

        function showCropLoading(show) {
            const btn = document.getElementById('crop-btn');
            const loader = document.getElementById('crop-loader');
            if (show) { btn.disabled = true; loader.classList.remove('hidden'); } 
            else { btn.disabled = false; loader.classList.add('hidden'); }
        }

        async function processImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const MAX_SIZE = 2048; 
                        let w = img.width; let h = img.height;
                        if (w > MAX_SIZE || h > MAX_SIZE) {
                            if (w > h) { h = Math.round((h * MAX_SIZE) / w); w = MAX_SIZE; } 
                            else { w = Math.round((w * MAX_SIZE) / h); h = MAX_SIZE; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.85), w, h });
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // --- Main UI Rendering ---
        function updateUI() {
            grid.innerHTML = '';
            images.forEach((img, i) => {
                const div = document.createElement('div');
                // Removed specific tiny handle. The entire card is now the draggable target.
                div.className = "grid-item-card relative aspect-square bg-slate-100 rounded-2xl overflow-hidden shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing group animate-in fade-in zoom-in duration-300";
                
                div.innerHTML = `
                    <img src="${img.dataUrl}" draggable="false" class="w-full h-full object-cover pointer-events-none select-none">
                    
                    <div class="absolute top-2 left-2 bg-black/60 backdrop-blur-md text-white rounded-md px-2 py-0.5 text-[11px] font-black pointer-events-none select-none shadow-sm z-10">
                        ${i + 1}
                    </div>
                    
                    <button onclick="removeImg(${i})" class="no-drag absolute top-2 right-2 bg-black/60 hover:bg-red-500 transition-colors text-white rounded-full w-8 h-8 flex items-center justify-center text-sm backdrop-blur-md shadow-sm z-20 active:scale-90">✕</button>
                `;
                grid.appendChild(div);
            });
            
            const hasData = images.length > 0;
            document.getElementById('settings-area').classList.toggle('hidden', !hasData);
            document.getElementById('action-bar').classList.toggle('hidden', !hasData);
            document.getElementById('stats').innerText = `${images.length} PHOTO${images.length !== 1 ? 'S' : ''}`;

            // Contextual Drag Hint logic
            const subtext = document.getElementById('stats-subtext');
            if (images.length > 1) {
                subtext.innerText = "Press & hold photo to reorder";
                subtext.classList.add('text-indigo-600');
                subtext.classList.remove('text-slate-500');
            } else {
                subtext.innerText = "Ready for review";
                subtext.classList.remove('text-indigo-600');
                subtext.classList.add('text-slate-500');
            }
        }

        function removeImg(i) { 
            images.splice(i, 1); 
            updateUI(); 
        }

        function openPreview() {
            modalPreview.classList.remove('hidden');
            modalPreview.classList.add('flex');
            setTimeout(() => modalPreview.classList.remove('translate-y-full'), 10);
            document.body.style.overflow = 'hidden';
            renderLivePreview();
        }

        function closePreview() {
            modalPreview.classList.add('translate-y-full');
            document.body.style.overflow = '';
            setTimeout(() => {
                modalPreview.classList.add('hidden');
                modalPreview.classList.remove('flex');
            }, 300);
        }

        function renderLivePreview() {
            scrollContainer.innerHTML = '';
            if (!images.length) {
                scrollContainer.innerHTML = `<p class="text-slate-400 font-bold mt-10">No photos to preview</p>`;
                return;
            }

            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);
            
            images.forEach((img, index) => {
                const page = document.createElement('div');
                page.className = "bg-white shadow-2xl relative shrink-0 rounded-sm overflow-hidden";
                page.style.width = "280px"; 
                page.style.height = "396px"; 
                
                const inner = document.createElement('img');
                inner.src = img.dataUrl;
                inner.style.position = "absolute";
                
                const pMargin = (margin * 1.3) + "px"; 
                inner.style.top = inner.style.left = inner.style.right = inner.style.bottom = pMargin;
                inner.style.width = `calc(100% - ${(margin*2)*1.3}px)`;
                inner.style.height = `calc(100% - ${(margin*2)*1.3}px)`;
                
                if (fit === 'contain') inner.style.objectFit = "contain";
                else if (fit === 'stretch') inner.style.objectFit = "fill";
                else inner.style.objectFit = "cover";

                page.appendChild(inner);
                
                const pageNum = document.createElement('div');
                pageNum.className = "absolute bottom-[-30px] w-full text-center text-slate-500 font-bold text-xs tracking-widest";
                pageNum.innerText = `PAGE ${index + 1}`;
                page.appendChild(pageNum);

                scrollContainer.appendChild(page);
            });
        }

        async function generateAndSharePDF() {
            const btn = document.getElementById('modal-export-btn');
            const loader = document.getElementById('modal-loader');
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);

            btn.disabled = true; 
            loader.classList.remove('hidden');
            await new Promise(r => setTimeout(r, 50));

            try {
                const doc = new jsPDF({ format: 'a4', unit: 'mm' });
                
                for (let i = 0; i < images.length; i++) {
                    if (i > 0) doc.addPage();
                    const img = images[i];
                    const pW = doc.internal.pageSize.getWidth();
                    const pH = doc.internal.pageSize.getHeight();
                    const aW = pW - (margin * 2);
                    const aH = pH - (margin * 2);

                    let dW = aW, dH = (img.h * aW) / img.w;
                    
                    if (fit === 'contain' && dH > aH) { dH = aH; dW = (img.w * aH) / img.h; }
                    if (fit === 'stretch') { dW = aW; dH = aH; }
                    if (fit === 'cover' && dH < aH) { dH = aH; dW = (img.w * aH) / img.h; }

                    doc.addImage(img.dataUrl, 'JPEG', (pW-dW)/2, (pH-dH)/2, dW, dH, undefined, 'FAST');
                }

                const fileName = `PicToPDF_${Date.now()}.pdf`;
                const blob = doc.output('blob');
                const file = new File([blob], fileName, { type: 'application/pdf' });

                if (isDesktop) {
                    doc.save(fileName);
                    closePreview();
                } else {
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({ files: [file], title: 'PDF Export' });
                            closePreview(); 
                        } catch (err) {
                            console.log("Share cancelled or failed");
                        }
                    } else {
                        doc.save(fileName);
                    }
                }
            } catch (error) {
                console.error("PDF Generation Error", error);
                alert("An error occurred during export.");
            }

            btn.disabled = false; 
            loader.classList.add('hidden');
        }
    </script>
</body>
</html>
