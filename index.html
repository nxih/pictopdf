<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PicToPDF | Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .pdf-page-shadow { shadow-[0_4px_12px_rgba(0,0,0,0.15)]; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 min-h-screen pb-40">

    <header class="glass sticky top-0 z-50 border-b px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tight text-indigo-600">PicToPDF</h1>
        <div class="flex gap-4">
            <button onclick="togglePreview()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Preview</button>
            <button onclick="location.reload()" class="text-sm font-medium text-slate-400">Reset</button>
        </div>
    </header>

    <main class="p-5 max-w-2xl mx-auto space-y-6">
        <div class="relative group">
            <input type="file" id="image-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer">
            <div class="bg-white border-2 border-dashed border-slate-300 rounded-3xl p-8 text-center active:scale-95 transition-transform">
                <div class="text-3xl mb-2">📸</div>
                <span class="text-slate-700 font-bold">Add from Apple Gallery</span>
            </div>
        </div>

        <section id="settings-area" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Image Scaling</label>
                    <select id="setting-fit" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-bold outline-none" onchange="updateLivePreview()">
                        <option value="contain">Fit (Keep Proportions)</option>
                        <option value="stretch">Stretch to Fill Page</option>
                        <option value="cover">Crop to Fill</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Page Size</label>
                    <select id="setting-page" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-bold outline-none" onchange="updateLivePreview()">
                        <option value="a4">A4 Standard</option>
                        <option value="letter">US Letter</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Margins (mm)</label>
                    <span id="margin-val" class="text-xs font-black text-indigo-600">10</span>
                </div>
                <input type="range" id="setting-margin" min="0" max="30" value="10" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none accent-indigo-600" oninput="document.getElementById('margin-val').innerText = this.value; updateLivePreview()">
            </div>
        </section>

        <div id="preview-grid" class="grid grid-cols-3 gap-3"></div>
    </main>

    <div id="preview-modal" class="fixed inset-0 z-[60] bg-black/90 hidden flex flex-col translate-y-full transition-transform duration-300">
        <div class="p-6 flex justify-between items-center text-white">
            <h2 class="font-bold">PDF Live Preview</h2>
            <button onclick="togglePreview()" class="bg-white/20 px-4 py-2 rounded-full text-sm font-bold">Close</button>
        </div>
        <div id="preview-scroll" class="flex-grow overflow-y-auto p-6 space-y-8 flex flex-col items-center no-scrollbar">
            </div>
    </div>

    <footer id="action-bar" class="hidden fixed bottom-0 left-0 right-0 glass border-t p-6 z-50">
        <div class="max-w-2xl mx-auto flex items-center gap-4">
            <div class="flex-grow">
                <p id="stats" class="text-xs font-black text-slate-400 uppercase tracking-tighter">0 Images</p>
                <p class="text-[10px] text-slate-400 italic">Photos keep original orientation</p>
            </div>
            <button id="convert-btn" onclick="generatePDF()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-indigo-200 active:scale-95 transition-all flex items-center gap-3">
                <span>EXPORT</span>
                <div id="loader" class="hidden border-2 border-white/30 border-t-white h-4 w-4 rounded-full animate-spin"></div>
            </button>
        </div>
    </footer>

    <script>
        const { jsPDF } = window.jspdf;
        let images = [];

        const input = document.getElementById('image-input');
        const grid = document.getElementById('preview-grid');
        const modal = document.getElementById('preview-modal');
        const scrollContainer = document.getElementById('preview-scroll');

        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const dataUrl = await readFile(file);
                const dimensions = await getImageDimensions(dataUrl);
                images.push({ dataUrl, ...dimensions });
            }
            updateUI();
        };

        function readFile(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = (e) => res(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function getImageDimensions(url) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => res({ w: img.width, h: img.height });
                img.src = url;
            });
        }

        function updateUI() {
            grid.innerHTML = '';
            images.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = "relative aspect-[3/4] bg-white rounded-xl overflow-hidden shadow-sm border";
                div.innerHTML = `<img src="${img.dataUrl}" class="w-full h-full object-cover">
                                 <button onclick="removeImg(${i})" class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                                 </button>`;
                grid.appendChild(div);
            });

            const hasData = images.length > 0;
            document.getElementById('settings-area').classList.toggle('hidden', !hasData);
            document.getElementById('action-bar').classList.toggle('hidden', !hasData);
            document.getElementById('stats').innerText = `${images.length} PHOTOS`;
            updateLivePreview();
        }

        window.removeImg = (i) => { images.splice(i, 1); updateUI(); };

        function togglePreview() {
            modal.classList.toggle('hidden');
            setTimeout(() => modal.classList.toggle('translate-y-full'), 10);
            updateLivePreview();
        }

        function updateLivePreview() {
            scrollContainer.innerHTML = '';
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);
            
            images.forEach((img) => {
                const page = document.createElement('div');
                // A4 Ratio Mockup
                page.className = "relative bg-white shadow-2xl overflow-hidden shrink-0";
                page.style.width = "280px"; 
                page.style.height = "396px"; // A4 aspect ratio

                const inner = document.createElement('div');
                inner.style.position = 'absolute';
                inner.style.top = margin + 'px';
                inner.style.left = margin + 'px';
                inner.style.right = margin + 'px';
                inner.style.bottom = margin + 'px';
                
                const previewImg = document.createElement('img');
                previewImg.src = img.dataUrl;
                previewImg.className = "w-full h-full";
                
                // Handling Stretch vs Fit vs Cover
                if (fit === 'contain') previewImg.className += " object-contain";
                else if (fit === 'stretch') previewImg.className += " object-fill";
                else previewImg.className += " object-cover";

                inner.appendChild(previewImg);
                page.appendChild(inner);
                scrollContainer.appendChild(page);
            });
        }

        async function generatePDF() {
            const btn = document.getElementById('convert-btn');
            const loader = document.getElementById('loader');
            const fit = document.getElementById('setting-fit').value;
            const margin = parseInt(document.getElementById('setting-margin').value);
            const format = document.getElementById('setting-page').value;

            btn.disabled = true;
            loader.classList.remove('hidden');

            const doc = new jsPDF({ unit: 'mm', format: format });
            
            for (let i = 0; i < images.length; i++) {
                if (i > 0) doc.addPage();
                
                const img = images[i];
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                
                const availW = pageWidth - (margin * 2);
                const availH = pageHeight - (margin * 2);

                let printW = availW;
                let printH = (img.h * availW) / img.w;

                if (fit === 'contain') {
                    if (printH > availH) {
                        printH = availH;
                        printW = (img.w * availH) / img.h;
                    }
                } else if (fit === 'stretch') {
                    printW = availW;
                    printH = availH;
                } else if (fit === 'cover') {
                    if (printH < availH) {
                        printH = availH;
                        printW = (img.w * availH) / img.h;
                    }
                }

                const x = (pageWidth - printW) / 2;
                const y = (pageHeight - printH) / 2;

                // Add image with compression and correct orientation
                doc.addImage(img.dataUrl, 'JPEG', x, y, printW, printH, undefined, 'MEDIUM');
            }

            doc.save(`Export_${Date.now()}.pdf`);
            btn.disabled = false;
            loader.classList.add('hidden');
        }
    </script>
</body>
</html>
